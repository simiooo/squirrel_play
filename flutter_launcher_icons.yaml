# Flutter Launcher Icons configuration
# Run: dart run flutter_launcher_icons
# Documentation: https://pub.dev/packages/flutter_launcher_icons

flutter_launcher_icons:
  image_path: "assets/logo.png"

  windows:
    generate: true
    image_path: "assets/logo.png"
    icon_size: 256

  macos:
    generate: true
    image_path: "assets/logo.png"
